name: FormCheck
options:
  bundleIdPrefix: com.formcheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  FormCheck:
    type: application
    platform: iOS
    sources:
      - FormCheck
    info:
      path: FormCheck/Info.plist
      properties:
        # IMPORTANT: with a custom Info.plist, INFOPLIST_KEY_* build settings
        # are IGNORED — every key must live here.
        NSCameraUsageDescription: "FormCheck uses the camera to analyze your lifting form in real time. Video is processed on-device and never leaves your phone."
        NSPhotoLibraryAddUsageDescription: "FormCheck saves your exported rep replays to your photo library when you choose to."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # On-device only, no proprietary crypto — skips the export-compliance
        # question on every App Store Connect upload.
        ITSAppUsesNonExemptEncryption: false
        # Keep version single-sourced from build settings.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aymenafia.formcheck
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 64BD3MXBAX
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
schemes:
  FormCheck:
    build:
      targets:
        FormCheck: all
    run:
      config: Debug
      storeKitConfiguration: Products.storekit
    archive:
      config: Release
